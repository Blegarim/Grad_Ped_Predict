name: ci

on: [push, pull_request]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install (core + dev only; not [infer]/[export])
        run: pip install -e .[dev]
      - name: Lint
        run: ruff check .
      - name: Test (gate)
        # Soft coverage report (term-missing); no --cov-fail-under floor yet — measure first (8.1 OQ).
        run: pytest -m "not slow" --maxfail=1 --cov=pedpredict --cov-report=term-missing
