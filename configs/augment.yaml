# AugmentCfg — offline minority-class augmentation (Prompt 1.4), porting OLD augment_sequences.py.
# The DEFAULT imbalance lever (policy 1.3): minority records (crosses=1 / looks=1) are oversampled
# into single-transform augmented copies and written to preprocessed_train_aug (lmdb_train[1]),
# unioned at train time with preprocessed_train. Negatives are NOT re-emitted here.
enabled: true
n_augs_min: 2            # OLD random.randint(2, 4) single-transform variants per call
n_augs_max: 4
p_flip: 0.5
p_color: 0.4
p_noise: 0.3
p_erase: 0.2
color_brightness: 0.2    # OLD T.ColorJitter(brightness=0.2, contrast=0.2, saturation=0.3, hue=0.1)
color_contrast: 0.2
color_saturation: 0.3
color_hue: 0.1
motion_noise_std: 0.02
erase_n_frames: 2
crosses_multiplier: 6    # OLD augment_minority_sequences(crosses_multiplier=6, looks_multiplier=3)
looks_multiplier: 3
seed: 42
