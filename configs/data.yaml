# DataCfg — data-layer constants (B7 magic constants relocated here).
max_seq_len: 20
motion_dim: 8            # must equal model.motion_dim (validated)
img_height: 128
img_width: 128
read_context_height: 224  # read-time context model input (OLD train.py); write-time context is img*context_scale=384
read_context_width: 224
context_scale: 3.0       # context crop = scale * tight bbox (uniform 3.0; override for ablation)
jpeg_quality: 90
chunk_size: 5000
# LMDB map_size (compute_map_size). C3: Windows PRE-ALLOCATES the file at map_size, and the legacy
# heuristic reserved ~3x the real payload (~2-3 GB JPEG per 5000-sample chunk) — explicit 4 GiB
# keeps ~30%+ headroom. A too-small value fails LOUDLY (lmdb.MapFullError); null -> heuristic.
lmdb_map_size_bytes: 4294967296
lmdb_map_size_floor_gib: 4.0
lmdb_map_size_safety: 1.5
# offline writer DataLoader parallelism (preprocessing only)
preprocess_num_workers: 8
preprocess_prefetch_factor: 2
seq_len: 20
stride: 3
future_offset: 30
tol: 2
# PIE source opts (generate_data_trajectory_sequence) — mirror the OLD data_opts literals
min_track_size: 10
fstride: 1
data_split_type: default
seq_type: all
squarify_ratio: 0.0
height_min: 0.0
height_max: null         # null -> float('inf')
norm_mean: [0.485, 0.456, 0.406]
norm_std:  [0.229, 0.224, 0.225]
