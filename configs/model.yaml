# ModelCfg — mirrors OLD config.py (vit_args_config / motion_enc_args_config) EXACTLY.
d_model: 128
in_channels: 3
motion_dim: 8            # must equal data.motion_dim (validated)
# A4 runtime motion normalization (applied in MotionEncoder.forward; ablatable from the same data):
#   image        -> fixed global scale (x/width, y/height, ego/ego_speed_scale); keeps absolute geometry
#   per_sequence -> legacy per-sequence z-norm (the "old" arm of the A4 ablation; golden-parity mode)
motion_norm: image
motion_norm_image_size: [1920, 1080]   # (W, H); must equal data.source_width/height (validated)
ego_speed_scale: 50.0    # km/h scale for the ego channel under image norm
stage_dims: [36, 36, 288, 36]
layer_nums: [2, 4, 5, 7]
head_nums:  [2, 2, 16, 2]
window_size: [8, 4, 2, null]
mlp_ratio:  [4, 4, 4, 4]
drop_path: 0.15
attn_dropout: 0.15
proj_dropout: 0.15
dropout: 0.15
motion_hidden_dim: 168
motion_num_layers: 2
motion_num_heads: 8
motion_dropout: 0.3
head_dropout: 0.1
num_classes: {actions: 2, looks: 2, crosses: 2}
# CrossAttentionModule — mirrors scripts/model_utils.get_model() full-model wiring.
cross_attn_num_heads: 4        # get_model passes num_heads=4 (NOT the class default 8)
use_frame_crosses: true
frame_pool: logsumexp          # {logsumexp, max, mean}
emit_crosses_pooled: true      # B4: live-but-unsupervised auxiliary head (kept ready to swap in)
