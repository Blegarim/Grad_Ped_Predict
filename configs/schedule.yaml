# ScheduleCfg — two-phase training schedule.
#
# enabled: false -> plain Trainer.fit() single-phase path (default).
# enabled: true  -> run_phase_schedule() in training/schedule.py.
#
# The default phases exactly reproduce OLD train_two_phase.py hardcoded values:
#   Phase 1: balanced-subset warmup    (lr=1e-4, 10 epochs, patience=5)
#   Phase 2: full augmented fine-tune  (lr=1e-5, 20 epochs, patience=5)
#   Phase 3: decouple classifiers      (lr=5e-5,  5 epochs, patience=3, freeze_backbone=true)
#
# Intentional deviations from OLD script (documented in docs/archive/MIGRATION.md):
#   D1: scheduler steps on val_loss (not train loss)
#   D2: early stopping on val_loss  (not 1 - macro_f1)
#   D3: MultiTaskLoss CE weights    (not FocalLoss)
#   D4: per-phase best_val_loss reset; Phase N+1 always loads Phase N best.pth
enabled: false
phases:
  - name: balanced_warmup
    data_source: balanced
    lr: 1.0e-4
    max_epochs: 10
    early_stop_patience: 5
    early_stop_min_delta: 0.001
    weight_decay: 1.0e-5
    sched_factor: 0.5
    sched_patience: 2
    sched_threshold: 1.0e-4
    freeze_backbone: false
    reload_best: false
  - name: full_finetune
    data_source: augmented
    lr: 1.0e-5
    max_epochs: 20
    early_stop_patience: 5
    early_stop_min_delta: 0.001
    weight_decay: 1.0e-5
    sched_factor: 0.5
    sched_patience: 2
    sched_threshold: 1.0e-4
    freeze_backbone: false
    reload_best: true
  - name: decouple_classifiers
    data_source: augmented
    lr: 5.0e-5
    max_epochs: 5
    early_stop_patience: 3
    early_stop_min_delta: 0.001
    weight_decay: 1.0e-5
    sched_factor: 0.5
    sched_patience: 2
    sched_threshold: 1.0e-4
    freeze_backbone: true
    reload_best: true
