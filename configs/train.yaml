# TrainCfg — replaces train.py:280-296,346 literals.
lr: 1.0e-4
weight_decay: 1.0e-5
batch_size: 4
num_epochs: 30
num_workers: 4
use_amp: true            # request; AND-gated by CUDA availability at runtime
loss_weight: {actions: 0.8, looks: 0.8, crosses: 1.2}
use_weighted_sampler: true
sampler_powers: {crosses: 1.5, actions: 0.3, looks: 0.7}
sampler_min_weight: 1.0e-6
grad_clip_max_norm: 1.0
early_stop_patience: 15
early_stop_min_delta: 0.001
sched_factor: 0.5
sched_patience: 2
sched_threshold: 1.0e-4
# chunk prefetch loader (Prompt 4.2, B9) — OLD train.py:367-498 literals.
chunk_preload_depth: 3
chunk_warm_ram_threshold: 96.0
chunk_warm_mem_interval: 1.0
chunk_warm_mem_timeout: null     # null preserves the legacy infinite RAM wait
chunk_queue_timeout: 300.0
dataloader_prefetch_factor: 2
